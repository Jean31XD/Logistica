index index.php index.html;

# Asegurar que X-Forwarded-Proto se pase correctamente
location / {
    try_files $uri $uri/ /index.php?$args;

    # No forzar redirección HTTPS aquí - lo maneja PHP
    # if ($http_x_forwarded_proto != "https") {
    #     return 301 https://$host$request_uri;
    # }
}

# Proteger archivos sensibles
location ~ /\.(env|git|gitignore) {
    deny all;
    return 404;
}

# Proteger directorio logs
location ^~ /logs/ {
    deny all;
    return 404;
}
